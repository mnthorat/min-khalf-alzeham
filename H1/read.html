<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>اقرأ أونلاين — من خلف الزحام — المتفائل</title>
<meta name="description" content="اقرأ كتاب من خلف الزحام أونلاين مباشرة من المتصفح، بدون تحميل أو تسجيل.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://mnthorat.github.io/min-khalf-alzeham/read.html">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Cairo:wght@500;600;700;800&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #090c14;
    --bg-2: #0d1220;
    --panel: #131a2e;
    --panel-2: #171f37;
    --gold: #b68d40;
    --gold-light: #dcb876;
    --gold-dim: rgba(182,141,64,0.55);
    --ivory: #ece5d6;
    --ivory-dim: #c9c2b2;
    --muted: #838ba3;
    --line: rgba(182,141,64,0.22);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 8px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background: var(--gold); }

  body {
    background:
      radial-gradient(1200px 600px at 15% -10%, rgba(182,141,64,0.08), transparent 60%),
      radial-gradient(900px 500px at 100% 10%, rgba(182,141,64,0.05), transparent 55%),
      var(--bg);
    color: var(--ivory);
    font-family: 'IBM Plex Sans Arabic', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  a { color: inherit; text-decoration: none; }

  /* ---------- HEADER ---------- */
  header.reader-nav {
    position: sticky; top: 0; z-index: 50;
    background: rgba(9,12,20,0.9);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--line);
    padding: 14px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    flex-wrap: wrap;
  }
  .brand { display: flex; align-items: center; gap: 10px; font-family: 'Aref Ruqaa', serif; font-size: 1.3rem; color: var(--ivory); }
  .brand .mark {
    width: 32px; height: 32px; border: 1px solid var(--gold-dim); border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 0.85rem; color: var(--gold-light);
    background: rgba(182,141,64,0.05); flex-shrink: 0;
  }
  .brand small { display: block; font-family: 'Cairo', sans-serif; font-size: 0.62rem; color: var(--gold-light); letter-spacing: 0.1em; font-weight: 600; }

  .nav-actions { display: flex; align-items: center; gap: 10px; }
  .icon-link {
    display: flex; align-items: center; gap: 8px;
    font-family: 'Cairo', sans-serif; font-weight: 600; font-size: 0.82rem;
    border: 1px solid var(--gold-dim); color: var(--ivory-dim);
    padding: 8px 16px; border-radius: 999px;
    transition: all .25s ease;
  }
  .icon-link:hover { border-color: var(--gold-light); color: var(--gold-light); background: rgba(182,141,64,0.08); }
  .icon-link.primary { background: linear-gradient(135deg, var(--gold-light), var(--gold)); color: #0a0e17; border-color: transparent; }
  .icon-link.primary:hover { filter: brightness(1.08); color: #0a0e17; transform: translateY(-1px); }

  /* ---------- TOOLBAR ---------- */
  .toolbar {
    position: sticky; top: 61px; z-index: 45;
    background: rgba(13,18,32,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
    padding: 10px 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .tool-btn {
    width: 38px; height: 38px;
    border: 1px solid var(--gold-dim); border-radius: 8px;
    background: rgba(182,141,64,0.05);
    color: var(--gold-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; cursor: pointer;
    transition: all .2s ease;
  }
  .tool-btn:hover:not(:disabled) { background: rgba(182,141,64,0.15); border-color: var(--gold-light); }
  .tool-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .page-indicator {
    display: flex; align-items: center; gap: 6px;
    font-family: 'Cairo', sans-serif; font-size: 0.85rem; color: var(--ivory-dim);
    padding: 0 6px;
  }
  .page-indicator input {
    width: 46px; text-align: center;
    background: var(--panel); border: 1px solid var(--line); border-radius: 6px;
    color: var(--ivory); font-family: 'Cairo', sans-serif; font-size: 0.85rem;
    padding: 7px 4px;
  }
  .page-indicator input:focus { outline: none; border-color: var(--gold-light); }

  .divider { width: 1px; height: 22px; background: var(--line); margin: 0 4px; }

  /* ---------- VIEWER ---------- */
  .viewer-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 34px 16px 70px;
    overflow: auto;
  }

  .page-shell {
    position: relative;
    box-shadow: 0 30px 80px -25px rgba(0,0,0,0.75), 0 0 0 1px rgba(182,141,64,0.25);
    border-radius: 4px;
    background: #fff;
    max-width: 100%;
    line-height: 0;
  }
  .page-shell canvas { display: block; max-width: 100%; height: auto; border-radius: 4px; }

  .loading-state {
    display: flex; flex-direction: column; align-items: center; gap: 18px;
    color: var(--ivory-dim); font-family: 'Cairo', sans-serif; font-size: 0.95rem;
    padding: 90px 20px;
    text-align: center;
  }
  .spinner {
    width: 42px; height: 42px; border-radius: 50%;
    border: 3px solid var(--line); border-top-color: var(--gold-light);
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-state {
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    color: var(--ivory-dim); font-family: 'Cairo', sans-serif; font-size: 0.95rem;
    padding: 90px 24px; text-align: center; max-width: 480px; margin: 0 auto;
  }
  .error-state b { color: var(--gold-light); font-size: 1.15rem; font-family: 'Aref Ruqaa', serif; }

  .swipe-hint {
    font-family: 'Cairo', sans-serif; font-size: 0.75rem; color: var(--muted);
    margin-top: 22px; text-align: center;
  }

  footer.reader-foot {
    border-top: 1px solid var(--line);
    padding: 18px 20px;
    text-align: center;
    font-family: 'Cairo', sans-serif; font-size: 0.75rem; color: var(--muted);
  }

  @media (max-width: 640px) {
    .brand span.full { display: none; }
    header.reader-nav { padding: 12px 14px; }
    .toolbar { top: 57px; padding: 8px 10px; gap: 6px; }
    .tool-btn { width: 34px; height: 34px; }
    .icon-link span.label { display: none; }
    .icon-link { padding: 8px 12px; }
  }
</style>
</head>
<body>

<header class="reader-nav">
  <div class="brand"><span class="mark">م</span><span class="full">من خلف الزحام<br><small>المتفائل</small></span></div>
  <div class="nav-actions">
    <a class="icon-link" href="index.html"><span>→</span><span class="label">الصفحة الرئيسية</span></a>
    <a class="icon-link primary" href="assets/book.pdf" download><span>⬇</span><span class="label">تحميل PDF</span></a>
  </div>
</header>

<div class="toolbar">
  <button class="tool-btn" id="prevBtn" title="الصفحة السابقة" aria-label="الصفحة السابقة">‹</button>
  <div class="page-indicator">
    <input type="number" id="pageInput" min="1" value="1">
    <span>/ <span id="pageCount">—</span></span>
  </div>
  <button class="tool-btn" id="nextBtn" title="الصفحة التالية" aria-label="الصفحة التالية">›</button>
  <div class="divider"></div>
  <button class="tool-btn" id="zoomOutBtn" title="تصغير" aria-label="تصغير">−</button>
  <button class="tool-btn" id="zoomInBtn" title="تكبير" aria-label="تكبير">+</button>
</div>

<main class="viewer-wrap" id="viewerWrap">
  <div class="loading-state" id="loadingState">
    <div class="spinner"></div>
    <div>جاري تحميل الكتاب…</div>
  </div>
</main>

<footer class="reader-foot">
  جميع الحقوق محفوظة للمؤلف © المتفائل — القراءة هنا مجانية وبدون تسجيل
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  const PDF_URL = 'assets/book.pdf';
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const viewerWrap = document.getElementById('viewerWrap');
  const loadingState = document.getElementById('loadingState');
  const pageInput = document.getElementById('pageInput');
  const pageCountEl = document.getElementById('pageCount');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const zoomInBtn = document.getElementById('zoomInBtn');
  const zoomOutBtn = document.getElementById('zoomOutBtn');

  let pdfDoc = null;
  let currentPage = 1;
  let totalPages = 0;
  let baseScale = 1.4;
  let zoomStep = 0;
  let renderTask = null;

  function computeFitScale(viewportWidth) {
    const available = Math.min(viewerWrap.clientWidth - 32, 900);
    return Math.max(available / viewportWidth, 0.4);
  }

  async function renderPage(num) {
    if (!pdfDoc) return;
    const page = await pdfDoc.getPage(num);
    const unscaled = page.getViewport({ scale: 1 });
    const fit = computeFitScale(unscaled.width);
    const scale = fit * Math.pow(1.2, zoomStep);
    const viewport = page.getViewport({ scale });

    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const outputScale = window.devicePixelRatio || 1;
    canvas.width = Math.floor(viewport.width * outputScale);
    canvas.height = Math.floor(viewport.height * outputScale);
    canvas.style.width = Math.floor(viewport.width) + 'px';
    canvas.style.height = Math.floor(viewport.height) + 'px';

    const shell = document.createElement('div');
    shell.className = 'page-shell';
    shell.appendChild(canvas);

    if (renderTask) { try { renderTask.cancel(); } catch(e) {} }

    const transform = outputScale !== 1 ? [outputScale, 0, 0, outputScale, 0, 0] : null;
    renderTask = page.render({ canvasContext: ctx, viewport, transform });

    viewerWrap.innerHTML = '';
    viewerWrap.appendChild(shell);

    try {
      await renderTask.promise;
    } catch (e) {
      if (e && e.name !== 'RenderingCancelledException') console.error(e);
    }

    currentPage = num;
    pageInput.value = num;
    prevBtn.disabled = num <= 1;
    nextBtn.disabled = num >= totalPages;
    viewerWrap.scrollTo({ top: 0, behavior: 'auto' });
  }

  function goTo(num) {
    num = Math.min(Math.max(1, num), totalPages);
    renderPage(num);
  }

  prevBtn.addEventListener('click', () => goTo(currentPage - 1));
  nextBtn.addEventListener('click', () => goTo(currentPage + 1));
  zoomInBtn.addEventListener('click', () => { zoomStep = Math.min(zoomStep + 1, 5); renderPage(currentPage); });
  zoomOutBtn.addEventListener('click', () => { zoomStep = Math.max(zoomStep - 1, -3); renderPage(currentPage); });

  pageInput.addEventListener('change', () => {
    const v = parseInt(pageInput.value, 10);
    if (!isNaN(v)) goTo(v);
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') goTo(currentPage + 1);   // RTL: left arrow = next
    if (e.key === 'ArrowRight') goTo(currentPage - 1);  // RTL: right arrow = prev
  });

  // Swipe support
  let touchStartX = null;
  viewerWrap.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].clientX; }, { passive: true });
  viewerWrap.addEventListener('touchend', (e) => {
    if (touchStartX === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 60) {
      if (dx < 0) goTo(currentPage + 1); // swipe left -> next (RTL)
      else goTo(currentPage - 1);
    }
    touchStartX = null;
  }, { passive: true });

  window.addEventListener('resize', () => { if (pdfDoc) renderPage(currentPage); });

  pdfjsLib.getDocument(PDF_URL).promise.then((doc) => {
    pdfDoc = doc;
    totalPages = doc.numPages;
    pageCountEl.textContent = totalPages;
    pageInput.max = totalPages;
    renderPage(1);
  }).catch((err) => {
    console.error(err);
    viewerWrap.innerHTML = `
      <div class="error-state">
        <b>تعذّر تحميل الكتاب</b>
        <p>حدث خطأ أثناء تحميل الملف. يمكنك تحميل نسخة PDF مباشرة بدلاً من ذلك.</p>
        <a class="icon-link primary" href="${PDF_URL}" download><span>⬇</span><span class="label">تحميل PDF</span></a>
      </div>`;
  });
</script>

</body>
</html>
