<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اقرأ الكتاب — من خلف الزحام — المتفائل</title>
<meta name="description" content="اقرأ كتاب «من خلف الزحام» كاملاً مباشرة من الموقع دون تحميل.">
<meta name="robots" content="index, follow">
<meta name="theme-color" content="#090c14">
<meta name="color-scheme" content="dark">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23090c14'/%3E%3Ccircle cx='50' cy='50' r='36' fill='none' stroke='%23dcb876' stroke-width='2.5'/%3E%3Ctext x='50' y='64' font-size='42' text-anchor='middle' fill='%23dcb876' font-family='Georgia, serif'%3Eم%3C/text%3E%3C/svg%3E">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Cairo:wght@500;600;700;800&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #090c14;
    --bg-2: #0d1220;
    --panel: #131a2e;
    --panel-2: #171f37;
    --gold: #b68d40;
    --gold-light: #dcb876;
    --gold-dim: rgba(182,141,64,0.55);
    --ivory: #ece5d6;
    --ivory-dim: #c9c2b2;
    --muted: #838ba3;
    --line: rgba(182,141,64,0.22);
    --shadow: 0 30px 80px -30px rgba(0,0,0,0.7);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { overflow-x: hidden; width: 100%; background: var(--bg); }

  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 8px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background: var(--gold); }

  body {
    background:
      radial-gradient(1200px 600px at 15% -10%, rgba(182,141,64,0.08), transparent 60%),
      radial-gradient(900px 500px at 100% 10%, rgba(182,141,64,0.05), transparent 55%),
      var(--bg);
    color: var(--ivory);
    font-family: 'IBM Plex Sans Arabic', sans-serif;
    font-weight: 300;
    line-height: 1.9;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    /* منع اختيار/سحب الصفحة (لا يمنع الوصول الفني للملف لكنه يمنع الاستخدام العرضي) */
    -webkit-user-select: none;
    user-select: none;
  }

  a { color: inherit; text-decoration: none; }
  a:focus-visible, button:focus-visible { outline: 2px solid var(--gold-light); outline-offset: 3px; border-radius: 4px; }

  /* ---------- NAV ---------- */
  header.nav {
    padding: 16px 0;
    background: rgba(9,12,20,0.9);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--line);
    position: sticky; top: 0; z-index: 60;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 0 20px; width: 100%; }
  header.nav .wrap { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .brand { display: flex; align-items: center; gap: 10px; font-family: 'Aref Ruqaa', serif; font-size: 1.4rem; font-weight: 700; color: var(--ivory); }
  .brand .mark {
    width: 32px; height: 32px; border: 1px solid var(--gold-dim); border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 0.9rem; color: var(--gold-light);
    background: rgba(182,141,64,0.05); font-family: 'Aref Ruqaa', serif;
  }
  .back-link {
    font-family: 'Cairo', sans-serif; font-weight: 600; font-size: 0.9rem;
    color: var(--gold-light); border: 1px solid var(--gold-dim); padding: 7px 16px; border-radius: 999px;
    transition: all .25s ease;
  }
  .back-link:hover { background: var(--gold); color: #0a0e17; }

  /* ---------- READER ---------- */
  main.reader {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    padding: 24px 16px 100px;
  }

  .book-title { text-align: center; margin-bottom: 22px; }
  .book-title .eyebrow {
    font-family: 'Cairo', sans-serif; font-weight: 700; font-size: 0.8rem;
    letter-spacing: 0.08em; color: var(--gold-light); display: inline-flex; align-items: center; gap: 8px;
  }
  .book-title .eyebrow::before { content: ""; width: 20px; height: 1px; background: var(--gold); display: inline-block; }
  .book-title h1 { font-family: 'Aref Ruqaa', serif; font-size: clamp(1.6rem, 3.5vw, 2.3rem); margin-top: 8px; color: var(--ivory); }

  #viewerHost {
    width: 100%; max-width: 780px; display: flex; flex-direction: column; align-items: center; gap: 18px;
  }

  .page-shell {
    position: relative; width: 100%; max-width: 640px;
    background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
    box-shadow: var(--shadow); overflow: hidden; display: flex; justify-content: center;
    min-height: 400px;
  }
  .page-shell canvas { display: block; width: 100%; height: auto; border-radius: inherit; }

  .status-msg {
    font-family: 'Cairo', sans-serif; color: var(--muted); font-size: 0.95rem; text-align: center;
    padding: 60px 20px;
  }
  .status-msg.error { color: #e08a8a; }

  /* شارة شفافة فوق الصفحة لثني المحاولات العابرة لالتقاط الصورة / السحب */
  .page-shield {
    position: absolute; inset: 0; z-index: 5;
  }

  /* ---------- CONTROLS ---------- */
  .controls {
    position: sticky; bottom: 16px; z-index: 50;
    display: flex; align-items: center; gap: 10px;
    background: rgba(19,26,46,0.92); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border: 1px solid var(--line); border-radius: 999px;
    padding: 10px 14px; box-shadow: var(--shadow);
    font-family: 'Cairo', sans-serif;
  }
  .ctrl-btn {
    width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--gold-dim);
    background: transparent; color: var(--gold-light); font-size: 1.1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: all .2s ease;
  }
  .ctrl-btn:hover:not(:disabled) { background: var(--gold); color: #0a0e17; }
  .ctrl-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .page-indicator { color: var(--ivory-dim); font-size: 0.9rem; font-weight: 600; min-width: 74px; text-align: center; user-select: none; }
  .page-indicator b { color: var(--gold-light); }

  .zoom-group { display: flex; align-items: center; gap: 6px; padding-inline-start: 8px; margin-inline-start: 6px; border-inline-start: 1px solid var(--line); }

  .fine-print {
    margin-top: 30px; color: var(--muted); font-size: 0.85rem; text-align: center; max-width: 520px;
    font-family: 'Cairo', sans-serif;
  }

  @media (max-width: 640px) {
    .controls { gap: 6px; padding: 8px 10px; }
    .ctrl-btn { width: 34px; height: 34px; font-size: 1rem; }
    .zoom-group { display: none; } /* التكبير التلقائي عبر عرض الشاشة كافٍ على الجوال */
  }
</style>
</head>
<body oncontextmenu="return false;">

<header class="nav">
  <div class="wrap">
    <div class="brand"><span class="mark">م</span>المتفائل</div>
    <a class="back-link" href="index.html">→ العودة للصفحة الرئيسية</a>
  </div>
</header>

<main class="reader">
  <div class="book-title">
    <span class="eyebrow">القراءة المباشرة</span>
    <h1>من خلف الزحام</h1>
  </div>

  <div id="viewerHost">
    <div class="page-shell" id="pageShell">
      <div class="status-msg" id="statusMsg">جارٍ تحميل الكتاب…</div>
    </div>

    <div class="controls" id="controls" style="display:none;">
      <button class="ctrl-btn" id="firstBtn" title="الصفحة الأولى" aria-label="الصفحة الأولى">⇤</button>
      <button class="ctrl-btn" id="prevBtn" title="السابقة" aria-label="الصفحة السابقة">›</button>
      <span class="page-indicator"><b id="curPage">1</b> / <span id="totalPages">–</span></span>
      <button class="ctrl-btn" id="nextBtn" title="التالية" aria-label="الصفحة التالية">‹</button>
      <button class="ctrl-btn" id="lastBtn" title="الصفحة الأخيرة" aria-label="الصفحة الأخيرة">⇥</button>
      <div class="zoom-group">
        <button class="ctrl-btn" id="zoomOutBtn" title="تصغير" aria-label="تصغير">−</button>
        <button class="ctrl-btn" id="zoomInBtn" title="تكبير" aria-label="تكبير">+</button>
      </div>
    </div>
  </div>

  <p class="fine-print">القراءة متاحة مباشرة من هذه الصفحة فقط. جميع الحقوق محفوظة للمؤلف — لا يجوز نسخ الكتاب أو إعادة نشره بأي وسيلة.</p>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

  const PDF_URL = "assets/book.pdf";

  const pageShell   = document.getElementById('pageShell');
  const statusMsg   = document.getElementById('statusMsg');
  const controls    = document.getElementById('controls');
  const curPageEl   = document.getElementById('curPage');
  const totalPagesEl= document.getElementById('totalPages');
  const firstBtn    = document.getElementById('firstBtn');
  const prevBtn     = document.getElementById('prevBtn');
  const nextBtn     = document.getElementById('nextBtn');
  const lastBtn     = document.getElementById('lastBtn');
  const zoomInBtn   = document.getElementById('zoomInBtn');
  const zoomOutBtn  = document.getElementById('zoomOutBtn');

  let pdfDoc = null;
  let currentPage = 1;
  let baseScale = 1;
  let zoomFactor = 1;
  let rendering = false;
  let pendingPage = null;

  function setStatus(text, isError) {
    pageShell.innerHTML = '<div class="status-msg' + (isError ? ' error' : '') + '">' + text + '</div>';
  }

  async function renderPage(num) {
    if (rendering) { pendingPage = num; return; }
    rendering = true;
    try {
      const page = await pdfDoc.getPage(num);
      const containerWidth = Math.min(pageShell.parentElement.clientWidth, 640);
      const unscaledViewport = page.getViewport({ scale: 1 });
      baseScale = containerWidth / unscaledViewport.width;
      const viewport = page.getViewport({ scale: baseScale * zoomFactor });

      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      const outputScale = window.devicePixelRatio || 1;
      canvas.width = Math.floor(viewport.width * outputScale);
      canvas.height = Math.floor(viewport.height * outputScale);
      canvas.style.width = viewport.width + 'px';
      canvas.style.height = viewport.height + 'px';

      pageShell.innerHTML = '';
      pageShell.appendChild(canvas);
      const shield = document.createElement('div');
      shield.className = 'page-shield';
      pageShell.appendChild(shield);

      const renderContext = {
        canvasContext: ctx,
        viewport: viewport,
        transform: outputScale !== 1 ? [outputScale, 0, 0, outputScale, 0, 0] : null
      };
      await page.render(renderContext).promise;

      curPageEl.textContent = num;
      firstBtn.disabled = prevBtn.disabled = (num <= 1);
      lastBtn.disabled  = nextBtn.disabled  = (num >= pdfDoc.numPages);
    } catch (err) {
      setStatus('تعذّر عرض هذه الصفحة. حاول مجدداً.', true);
      console.error(err);
    } finally {
      rendering = false;
      if (pendingPage !== null) {
        const next = pendingPage;
        pendingPage = null;
        renderPage(next);
      }
    }
  }

  function goTo(num) {
    if (!pdfDoc) return;
    currentPage = Math.min(Math.max(num, 1), pdfDoc.numPages);
    renderPage(currentPage);
  }

  firstBtn.addEventListener('click', () => goTo(1));
  lastBtn.addEventListener('click', () => goTo(pdfDoc ? pdfDoc.numPages : 1));
  prevBtn.addEventListener('click', () => goTo(currentPage - 1));
  nextBtn.addEventListener('click', () => goTo(currentPage + 1));
  zoomInBtn.addEventListener('click', () => { zoomFactor = Math.min(zoomFactor + 0.15, 2); renderPage(currentPage); });
  zoomOutBtn.addEventListener('click', () => { zoomFactor = Math.max(zoomFactor - 0.15, 0.6); renderPage(currentPage); });

  document.addEventListener('keydown', (e) => {
    if (!pdfDoc) return;
    if (e.key === 'ArrowRight') goTo(currentPage - 1); /* واجهة RTL: يمين = السابقة */
    if (e.key === 'ArrowLeft') goTo(currentPage + 1);
    // منع اختصارات الحفظ/الطباعة الشائعة
    if ((e.ctrlKey || e.metaKey) && ['s','p','S','P'].includes(e.key)) e.preventDefault();
  });

  window.addEventListener('resize', () => { if (pdfDoc) renderPage(currentPage); });

  function getRequestedPage(maxPages) {
    const params = new URLSearchParams(window.location.search);
    const p = parseInt(params.get('page'), 10);
    if (!p || isNaN(p)) return 1;
    return Math.min(Math.max(p, 1), maxPages);
  }

  (async function init() {
    try {
      const loadingTask = pdfjsLib.getDocument({ url: PDF_URL, disableAutoFetch: false });
      pdfDoc = await loadingTask.promise;
      totalPagesEl.textContent = pdfDoc.numPages;
      controls.style.display = 'flex';
      currentPage = getRequestedPage(pdfDoc.numPages);
      await renderPage(currentPage);
    } catch (err) {
      setStatus('تعذّر تحميل الكتاب حالياً. تأكد من رفع ملف assets/book.pdf على المستودع.', true);
      console.error(err);
    }
  })();
</script>

</body>
</html>
